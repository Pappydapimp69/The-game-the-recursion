# Explicit Actions-based Pages deploy. A dynamic branch-source Pages build can get
# stuck queued with no jobs (dbh#E6); an explicit workflow is the reliable path.
# Deploys the repo root as-is (static ES modules, no build step). Runs the smoke
# test first so a broken determinism/regression state never ships.
name: Deploy Pages

on:
  push:
    branches: [claude/phase-5-recursion, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: '.' }
      - id: deployment
        uses: actions/deploy-pages@v4
